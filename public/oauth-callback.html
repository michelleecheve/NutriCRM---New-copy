<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Autorizando con Google...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8fafc; }
    .box { text-align: center; color: #475569; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Autorizando con Google...<br>Esta ventana se cerrará automáticamente.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get('code');
    const error = params.get('error');
    if (window.opener) {
      window.opener.postMessage(
        { type: 'GOOGLE_OAUTH_CALLBACK', code, error },
        window.location.origin
      );
      window.close();
    }
  </script>
</body>
</html>
